<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CollectHub</title>
    <style>
        /* --- CollectHub Theme --- */
        :root {
            --bg-dark: #0f111a; /* Deep navy background */
            --bg-card: #1a1d2d; /* Slightly lighter card background */
            --accent: #6c5ce7;  /* Premium purple accent */
            --accent-hover: #8172ea;
            --text-main: #ffffff;
            --text-muted: #8e95b3;
            --border-color: #2a2d45;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden; /* Prevent body scrolling, let main handle it */
        }

        .hidden { display: none !important; }

        /* --- Auth Screen Styling --- */
        #auth-view {
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px;
        }
        .auth-box {
            background-color: var(--bg-card); padding: 30px; border-radius: 12px; width: 100%; max-width: 350px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4); border: 1px solid var(--border-color);
        }
        .auth-box h1 { text-align: center; margin-bottom: 25px; color: var(--text-main); letter-spacing: 1px; }
        .auth-box h1 span { color: var(--accent); }
        .auth-box input {
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--border-color);
            background: var(--bg-dark); color: white; font-size: 14px; outline: none; transition: border 0.3s;
        }
        .auth-box input:focus { border-color: var(--accent); }
        .auth-box button {
            width: 100%; padding: 12px; border-radius: 8px; border: none; font-size: 15px; font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: background 0.2s;
        }
        #btn-login { background-color: var(--accent); color: white; }
        #btn-login:hover { background-color: var(--accent-hover); }
        #btn-signup { background-color: transparent; border: 1px solid var(--accent); color: var(--accent); }
        #btn-signup:hover { background-color: rgba(108, 92, 231, 0.1); }

        /* --- Main App Layout (Sidebar + Content) --- */
        #app-view { display: flex; flex-direction: row; height: 100vh; width: 100vw; }

        /* --- Sidebar Navigation --- */
        #sidebar {
            width: 70px;
            background-color: var(--bg-card);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            z-index: 100;
        }

        .brand-icon {
            font-size: 24px;
            font-weight: 900;
            color: var(--accent);
            margin-bottom: 40px;
            cursor: default;
        }

        .nav-items {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            align-items: center;
        }

        .nav-item {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 24px;
            cursor: pointer;
            padding: 10px;
            border-radius: 12px;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 48px;
            height: 48px;
        }

        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .nav-item.active {
            background-color: rgba(108, 92, 231, 0.15);
            color: var(--accent);
            border: 1px solid rgba(108, 92, 231, 0.3);
        }

        .sidebar-spacer {
            flex-grow: 1; /* Pushes the profile pic to the bottom */
        }

        .sidebar-pfp {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border: 2px solid var(--border-color);
            transition: border 0.2s ease;
        }
        
        .nav-item.active .sidebar-pfp {
            border-color: var(--accent);
        }

        /* --- Main Content Area --- */
        main {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
            position: relative;
        }

        .tab-content { display: none; height: 100%; }
        .tab-content.active { display: block; }
        
        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        /* Temp Placeholder Content */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60%;
            color: var(--text-muted);
            text-align: center;
        }
        .empty-state span { font-size: 48px; margin-bottom: 15px; opacity: 0.5; }

        /* Profile specific */
        .profile-card {
            background-color: var(--bg-card); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color);
            max-width: 400px;
        }
        .logout-btn { background-color: #ff4757; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 20px;}
        .logout-btn:hover { background-color: #ff6b81; }

    </style>
</head>
<body>

    <div id="auth-view">
        <div class="auth-box">
            <h1>Collect<span>Hub</span></h1>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
            <button id="btn-login">Log In</button>
            <button id="btn-signup">Sign Up</button>
        </div>
    </div>

    <div id="app-view" class="hidden">
        
        <nav id="sidebar">
            <div class="brand-icon">CH</div>
            
            <div class="nav-items">
                <button class="nav-item active" onclick="switchTab('home', this)" title="Home">🏠</button>
                <button class="nav-item" onclick="switchTab('cards', this)" title="Cards">🃏</button>
                <button class="nav-item" onclick="switchTab('auction', this)" title="Auction Hub">🏛️</button>
                <button class="nav-item" onclick="switchTab('trade', this)" title="Trade">🤝</button>
            </div>
            
            <div class="sidebar-spacer"></div>
            
            <button class="nav-item" onclick="switchTab('profile', this)" title="Profile" style="margin-bottom: 10px;">
                <div class="sidebar-pfp">👤</div>
            </button>
        </nav>

        <main>
            <div id="tab-home" class="tab-content active">
                <h2 class="page-title">Dashboard</h2>
                <div class="empty-state">
                    <span>🏠</span>
                    <p>Welcome to CollectHub.<br>Your latest updates will appear here.</p>
                </div>
            </div>

            <div id="tab-cards" class="tab-content">
                <h2 class="page-title">My Collection</h2>
                <div class="empty-state">
                    <span>🃏</span>
                    <p>Your binder is currently empty.<br>Time to start collecting!</p>
                </div>
            </div>

            <div id="tab-auction" class="tab-content">
                <h2 class="page-title">Auction Hub</h2>
                <div class="empty-state">
                    <span>🏛️</span>
                    <p>Live auctions loading soon...</p>
                </div>
            </div>

            <div id="tab-trade" class="tab-content">
                <h2 class="page-title">Trade Center</h2>
                <div class="empty-state">
                    <span>🤝</span>
                    <p>No active trade offers.</p>
                </div>
            </div>

            <div id="tab-profile" class="tab-content">
                <h2 class="page-title">Collector Profile</h2>
                <div class="profile-card">
                    <p style="color: var(--text-muted); margin-bottom: 5px; font-size: 14px;">Logged in as:</p>
                    <p id="user-email-display" style="font-size: 18px; font-weight: bold; margin-bottom: 20px;"></p>
                    <button class="logout-btn" id="btn-logout">Log Out</button>
                </div>
            </div>
        </main>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // Your specific Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyC76kcvy1mou2ZgWuDBxyRuqtZICVFz6Rg",
            authDomain: "lobet-7b058.firebaseapp.com",
            projectId: "lobet-7b058",
            storageBucket: "lobet-7b058.firebasestorage.app",
            messagingSenderId: "625857018312",
            appId: "1:625857018312:web:b80f0b804d856ac34ee8fd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // View Containers
        const authView = document.getElementById('auth-view');
        const appView = document.getElementById('app-view');
        const userEmailDisplay = document.getElementById('user-email-display');

        // Auth Inputs
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');

        // Handle State Changes
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Logged In -> Show App, Hide Auth
                authView.classList.add('hidden');
                appView.classList.remove('hidden');
                userEmailDisplay.innerText = user.email;
            } else {
                // Logged Out -> Show Auth, Hide App
                authView.classList.remove('hidden');
                appView.classList.add('hidden');
                emailInput.value = '';
                passwordInput.value = '';
            }
        });

        // Auth Buttons
        document.getElementById('btn-signup').addEventListener('click', () => {
            createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value)
                .catch((error) => alert(error.message));
        });

        document.getElementById('btn-login').addEventListener('click', () => {
            signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value)
                .catch((error) => alert("Error: Incorrect email or password."));
        });

        document.getElementById('btn-logout').addEventListener('click', () => {
            signOut(auth).then(() => {
                // Reset tab to home on logout
                switchTab('home', document.querySelector('.nav-item')); 
            });
        });

        // --- Tab Switching Logic ---
        window.switchTab = function(tabName, btnElement) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            // Show selected tab
            document.getElementById('tab-' + tabName).classList.add('active');

            // Update nav styles
            document.querySelectorAll('.nav-item').forEach(nav => {
                nav.classList.remove('active');
            });
            btnElement.classList.add('active');
        };
    </script>
</body>
</html>
